<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Display | Web Apps</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link href="css/style.css" rel="stylesheet" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <i class="bi bi-grid-3x3-gap-fill me-2"></i>Web Apps
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navLinks"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navLinks">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="movie.html"
                ><i class="bi bi-film me-1"></i>Movies</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="weather.html"
                ><i class="bi bi-cloud-sun me-1"></i>Weather</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="translator.html"
                ><i class="bi bi-translate me-1"></i>Translator</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="index.html"
                ><i class="bi bi-house-door me-1"></i>Home</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <!-- End Navbar -->
    <!-- Search bar section -->
    <section class="container mt-4">
      <div class="search-container">
        <input
          type="text"
          id="citySearch"
          class="search-input"
          placeholder="&#128269; Enter a city name and press Enter..."
          autocomplete="off"
        />
      </div>
    </section>
    <!-- End search bar section -->
    <!-- Loading spinner -->
    <div class="loading-spinner" id="loadingSpinner">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <p class="mt-2 text-muted">Fetching weather data...</p>
    </div>
    <!-- End loading spinner -->
    <!-- weather section -->
    <section class="container pb-5" id="weatherDisplay" style="display: none">
      <div class="weather-card mb-4" id="currentWeather"></div>
      <h2 class="section-title">5-Day Forecast</h2>
      <div
        class="row g-3 row-cols-2 row-cols-sm-3 row-cols-md-5"
        id="forecastGrid"
      ></div>
    </section>
    <!-- End weather section -->
    <!-- Default text section on page load -->
    <section class="container text-center py-5" id="initialMessage">
      <i
        class="bi bi-geo-alt"
        style="font-size: 4rem; color: var(--primary)"
      ></i>
      <h3 class="mt-3">Search for a City</h3>
      <p class="text-muted">
        Enter a city name above and press Enter to see the current weather and
        forecast.
      </p>
    </section>
    <!-- End default text section -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="config.js"></script>
    <script src="js/weather.js"></script>
  </body>
</html>
