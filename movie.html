<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Search | Web Apps</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link href="css/style.css" rel="stylesheet" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <i class="bi bi-grid-3x3-gap-fill me-2"></i>Web Apps
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navLinks"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navLinks">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link active" href="movie.html"
                ><i class="bi bi-film me-1"></i>Movies</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="weather.html"
                ><i class="bi bi-cloud-sun me-1"></i>Weather</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="translator.html"
                ><i class="bi bi-translate me-1"></i>Translator</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="index.html"
                ><i class="bi bi-house-door me-1"></i>Home</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <!-- End Navbar -->
    <!-- search bar section -->
    <section class="container mt-4">
      <div class="search-container">
        <input
          type="text"
          id="movieSearch"
          class="search-input"
          placeholder="&#128269; Search for a movie..."
          autocomplete="off"
        />
      </div>
    </section>
    <!-- End search bar section -->
    <!-- Main section -->
    <section class="container">
      <h2 class="section-title" id="sectionTitle">Popular Movies</h2>
    </section>

    <div class="loading-spinner" id="loadingSpinner">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <p class="mt-2 text-muted">Fetching movies...</p>
    </div>

    <section class="container pb-5">
      <div class="row g-4" id="movieGrid"></div>
    </section>

    <div
      class="modal fade"
      id="movieModal"
      tabindex="-1"
      aria-labelledby="modalTitle"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header border-0">
            <h5 class="modal-title fw-bold" id="modalTitle"></h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body" id="modalBody"></div>
        </div>
      </div>
    </div>
    <!-- End Main section -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="config.js"></script>
    <script src="js/movie.js"></script>
  </body>
</html>
