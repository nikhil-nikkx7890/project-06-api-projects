<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Translator | Web Apps</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link href="css/style.css" rel="stylesheet" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <i class="bi bi-grid-3x3-gap-fill me-2"></i>Web Apps
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navLinks"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navLinks">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="movie.html"
                ><i class="bi bi-film me-1"></i>Movies</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="weather.html"
                ><i class="bi bi-cloud-sun me-1"></i>Weather</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="translator.html"
                ><i class="bi bi-translate me-1"></i>Translator</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="index.html"
                ><i class="bi bi-house-door me-1"></i>Home</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <!-- End Navbar -->
    <!-- Hero text -->
    <section class="container mt-4 mb-3">
      <h1 class="section-title text-center">Text Translator</h1>
      <p class="text-center text-muted">
        Translate text between 15+ languages instantly
      </p>
    </section>
    <!-- End hero text -->
    <!-- Main -->
    <section class="container pb-5">
      <div class="translator-container">
        <div class="translator-box">
          <div class="row align-items-center mb-3">
            <div class="col-5">
              <select
                class="form-select"
                id="sourceLang"
                aria-label="Source language"
              ></select>
            </div>
            <div class="col-2 text-center">
              <button
                class="swap-btn mx-auto"
                id="swapBtn"
                title="Swap languages"
              >
                <i class="bi bi-arrow-left-right"></i>
              </button>
            </div>
            <div class="col-5">
              <select
                class="form-select"
                id="targetLang"
                aria-label="Target language"
              ></select>
            </div>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <textarea
                id="sourceText"
                placeholder="Enter text to translate..."
                maxlength="5000"
              ></textarea>
              <small class="text-muted" id="charCount">0 / 5000</small>
            </div>
            <div class="col-md-6">
              <textarea
                id="translatedText"
                placeholder="Translation will appear here..."
                readonly
              ></textarea>
            </div>
          </div>

          <div class="text-center">
            <button class="btn btn-primary translate-btn" id="translateBtn">
              <i class="bi bi-translate me-2"></i>Translate
            </button>
            <p class="text-muted mt-2 mb-0">
              <small
                >Tip: Press <kbd>Ctrl</kbd>+<kbd>Enter</kbd> to translate</small
              >
            </p>
          </div>
        </div>
      </div>
    </section>
    <!-- End Main -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/translator.js"></script>
  </body>
</html>
